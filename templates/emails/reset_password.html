<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
        }

        .btn {
            display:inline-block;
            padding: 12px 20px;
            background-color: #e91e63;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .footer{
            margin-top: 12px;
            font-size: 12px;
            color: #777;
        }


    </style>
</head>
<body>
    <div class="container">
         <h2>Password Reset Request</h2>

         <p>Hello</p>

         <p>Click on the button to reset the password.</p>
        
         <p>
            <a href="{{ reset_link }}" class="btn">Reset Password</a>
         </p>

         <p>This link will expire in <strong>10 minutes</strong>.</p>

         <p>If you did not request this, please ignore this email.</p>

         <div class="footer">
            © {{ current_year }} Beauty Parlor Management System
         </div>
    </div>
</body>
</html>
